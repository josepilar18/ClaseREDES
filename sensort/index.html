<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Motor</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<h1>⚙️ Sistema de Control Motor</h1>

<button onclick="connectSerial()">Conectar Arduino</button>

<div class="container">

    <div class="card">
        <h3>Temperatura</h3>
        <div id="temp" class="value">--</div>
    </div>

    <div class="card">
        <h3>Rango</h3>
        <div id="rango" class="value">--</div>
    </div>

    <div class="card">
        <h3>Velocidad PWM</h3>
        <div id="pwm" class="value">--</div>
    </div>

    <div class="card">
        <h3>RPM</h3>
        <div id="rpm" class="value">--</div>
    </div>

    <div class="card">
        <h3>Motor</h3>
        <div class="motor"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
